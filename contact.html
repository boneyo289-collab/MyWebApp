<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제휴문의</title>
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface-2: #fafafc;
    --border: #ececf1;
    --text: #1c1c22;
    --text-soft: #8a8a95;
    --text-faint: #b8b8c2;
    --accent: #6d5efc;
    --accent-soft: #eeecff;
    --danger: #f0506e;
    --success: #16a34a;
    --shadow: 0 20px 60px -18px rgba(38, 30, 92, 0.28);
    --ring: rgba(109, 94, 252, 0.18);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e0e13;
      --surface: #17171f;
      --surface-2: #1d1d27;
      --border: #26262f;
      --text: #ececf1;
      --text-soft: #8f8fa0;
      --text-faint: #55555f;
      --accent: #8b7dff;
      --accent-soft: #23203a;
      --danger: #ff6b85;
      --success: #4ade80;
      --shadow: 0 24px 70px -20px rgba(0, 0, 0, 0.65);
      --ring: rgba(139, 125, 255, 0.28);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background:
      radial-gradient(1100px 600px at 15% -10%, rgba(109, 94, 252, 0.16), transparent 60%),
      radial-gradient(900px 600px at 110% 10%, rgba(240, 80, 110, 0.10), transparent 55%),
      var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 56px 20px;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: var(--surface);
    width: 100%;
    max-width: 480px;
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: 34px 30px 30px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .lead {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.5;
    margin-bottom: 26px;
  }

  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 7px;
    color: var(--text);
  }
  label .req { color: var(--accent); }
  input, textarea {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  }
  input::placeholder, textarea::placeholder { color: var(--text-faint); }
  input:focus, textarea:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 4px var(--ring);
  }
  textarea { resize: vertical; min-height: 120px; line-height: 1.5; }

  button {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.12s, filter 0.18s, opacity 0.18s;
    box-shadow: 0 10px 24px -10px var(--accent);
  }
  button:hover { filter: brightness(1.06); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.6; cursor: default; transform: none; }

  .status {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
  }
  .status.show { display: block; animation: pop 0.28s cubic-bezier(0.22, 1, 0.36, 1); }
  .status.success {
    background: var(--accent-soft);
    color: var(--success);
    border: 1px solid var(--border);
  }
  .status.error {
    background: var(--accent-soft);
    color: var(--danger);
    border: 1px solid var(--border);
  }
  @keyframes pop { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .back {
    display: inline-block;
    margin-top: 22px;
    font-size: 13px;
    color: var(--text-soft);
    text-decoration: none;
  }
  .back:hover { color: var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Partnership</div>
    <h1>제휴문의</h1>
    <p class="lead">협업·제휴 제안을 남겨주세요. 확인 후 입력해주신 이메일로 회신드립니다.</p>

    <form id="contact-form" action="https://formspree.io/f/xeebbyne" method="POST">
      <div class="field">
        <label for="name">이름 / 회사명 <span class="req">*</span></label>
        <input type="text" id="name" name="name" placeholder="홍길동 / 주식회사 예시" required maxlength="100">
      </div>
      <div class="field">
        <label for="email">이메일 <span class="req">*</span></label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required maxlength="150">
      </div>
      <div class="field">
        <label for="phone">연락처 <span style="color:var(--text-faint);font-weight:400;">(선택)</span></label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" maxlength="30">
      </div>
      <div class="field">
        <label for="message">제휴 내용 <span class="req">*</span></label>
        <textarea id="message" name="message" placeholder="제휴 목적, 제안 내용 등을 자유롭게 작성해주세요." required maxlength="2000"></textarea>
      </div>
      <button type="submit" id="submit-btn">문의 보내기</button>
    </form>

    <div class="status" id="status"></div>
    <a class="back" href="./index.html">← 할 일 목록으로</a>
  </div>

<script>
  const form = document.getElementById('contact-form');
  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('status');

  function showStatus(msg, type) {
    status.textContent = msg;
    status.className = 'status show ' + type;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = '보내는 중…';
    status.className = 'status';

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        form.reset();
        showStatus('문의가 정상적으로 접수되었습니다. 빠른 시일 내에 회신드리겠습니다. 🙌', 'success');
        btn.textContent = '전송 완료';
      } else {
        const data = await res.json().catch(() => ({}));
        const detail = data.errors ? data.errors.map(x => x.message).join(', ') : '';
        showStatus('전송에 실패했습니다. ' + (detail || '잠시 후 다시 시도해주세요.'), 'error');
        btn.disabled = false;
        btn.textContent = '문의 보내기';
      }
    } catch {
      showStatus('네트워크 오류로 전송하지 못했습니다. 잠시 후 다시 시도해주세요.', 'error');
      btn.disabled = false;
      btn.textContent = '문의 보내기';
    }
  });
</script>
</body>
</html>
